name: Publish Docker image (feat/ui-glass-refresh)

on:
  push:
    branches:
      - feat/ui-glass-refresh
  workflow_dispatch:

concurrency:
  group: docker-feat-ui-glass-refresh
  cancel-in-progress: true

jobs:
  build_and_push:
    name: Build and push (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Normalize GHCR repository and short SHA
        run: |
          echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}:feat-ui-glass-refresh
            ghcr.io/${{ env.GHCR_REPOSITORY }}:feat-ui-glass-refresh-${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
