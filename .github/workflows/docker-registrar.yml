name: Publish Registrar Docker image

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'registrar/**'
  workflow_dispatch:

concurrency:
  group: docker-registrar-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build_and_push:
    name: Build and push Registrar (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Normalize GHCR repository and short SHA
        run: |
          echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          TAGS="ghcr.io/${{ env.GHCR_REPOSITORY }}/registrar:${{ env.BRANCH }}"
          TAGS="${TAGS},ghcr.io/${{ env.GHCR_REPOSITORY }}/registrar:${{ env.BRANCH }}-${{ env.SHORT_SHA }}"
          if [ "${{ env.BRANCH }}" = "main" ]; then
            TAGS="${TAGS},ghcr.io/${{ env.GHCR_REPOSITORY }}/registrar:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./registrar
          file: ./registrar/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=registrar
          cache-to: type=gha,scope=registrar,mode=max
          provenance: false
          sbom: false
